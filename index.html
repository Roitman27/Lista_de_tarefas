<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <h1>To-do List</h1>

        <div class="input-area">
            <input type="text" id="inputTarefa" placeholder="Digite uma tarefa">
            <button onclick="adicionarTarefa()">Adicionar</button>
        </div>

        <ul id="listaTarefas"></ul>

        <div class="controles">
            <span id="contador"></span>

            <div class="filtros">
                <button onclick="definirFiltro('todas')">Todas</button>
                <button onclick="definirFiltro('pendentes')">Pendentes</button>
                <button onclick="definirFiltro('concluidas')">Concluídas</button>
            </div>

            <button onclick="limparConcluidas()">Limpar Concluídas</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
